<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《六國論》課堂小遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --crimson: #8B1A1A;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --ink: #1A1A2E;
  --parchment: #F5F0E8;
  --parchment-dark: #E8DFD0;
  --jade: #2D6A4F;
  --jade-light: #40916C;
  --seal-red: #C23B22;
  --shadow: rgba(26, 26, 46, 0.15);
  --bg-primary: var(--parchment);
  --bg-secondary: #FFFFFF;
  --bg-card: #FFFDF7;
  --text-primary: var(--ink);
  --text-secondary: #4A4A5A;
  --border-color: #D4C5A9;
  --hover-bg: rgba(201, 168, 76, 0.1);
  --correct-bg: #E8F5E9;
  --correct-border: #4CAF50;
  --wrong-bg: #FFEBEE;
  --wrong-border: #F44336;
  --modal-bg: rgba(26, 26, 46, 0.6);
}

html.dark {
  --crimson: #D4464B;
  --gold: #E8C86A;
  --gold-light: #6B5B3A;
  --ink: #E8E0D0;
  --parchment: #1A1A2E;
  --parchment-dark: #16213E;
  --jade: #52B788;
  --jade-light: #74C69D;
  --seal-red: #E8594D;
  --shadow: rgba(0, 0, 0, 0.4);
  --bg-primary: #0F0F1A;
  --bg-secondary: #1A1A2E;
  --bg-card: #22223A;
  --text-primary: #E8E0D0;
  --text-secondary: #A8A0B0;
  --border-color: #3A3A5A;
  --hover-bg: rgba(232, 200, 106, 0.08);
  --correct-bg: #1B3A2A;
  --correct-border: #4CAF50;
  --wrong-bg: #3A1A1A;
  --wrong-border: #F44336;
  --modal-bg: rgba(0, 0, 0, 0.75);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Serif TC', serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(139,26,26,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(45,106,79,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 16px;
  position: relative;
  z-index: 1;
}

/* ========== HEADER ========== */
.header {
  text-align: center;
  padding: 32px 16px 24px;
  position: relative;
}

.header::after {
  content: '';
  display: block;
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 20px auto 0;
}

.title-wrapper {
  display: inline-block;
  position: relative;
}

.title-deco {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 8px;
  margin-bottom: 8px;
  opacity: 0.8;
}

.main-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(32px, 7vw, 48px);
  color: var(--crimson);
  letter-spacing: 6px;
  line-height: 1.3;
  text-shadow: 1px 1px 2px var(--shadow);
}

.subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
  letter-spacing: 2px;
}

.author-tag {
  display: inline-block;
  margin-top: 12px;
  padding: 4px 16px;
  border: 1px solid var(--gold);
  border-radius: 2px;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 3px;
  opacity: 0.9;
}

/* ========== MODE SELECT ========== */
.mode-select {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  padding: 20px 0;
}

.mode-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 24px 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.mode-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  transition: all 0.3s ease;
}

.mode-card:nth-child(1)::before { background: var(--crimson); }
.mode-card:nth-child(2)::before { background: var(--jade); }
.mode-card:nth-child(3)::before { background: var(--gold); }

.mode-card:hover, .mode-card:active {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--shadow);
  border-color: var(--gold);
}

.mode-icon {
  font-size: 28px;
  margin-bottom: 10px;
}

.mode-card:nth-child(1) .mode-icon { color: var(--crimson); }
.mode-card:nth-child(2) .mode-icon { color: var(--jade); }
.mode-card:nth-child(3) .mode-icon { color: var(--gold); }

.mode-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: 2px;
}

.mode-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ========== GAME VIEWS ========== */
.game-view {
  display: none;
  animation: fadeIn 0.4s ease;
}

.game-view.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-secondary);
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 16px;
}

.back-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.game-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2px;
}

.score-display {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
}

/* ========== MODE 1: VOCABULARY MATCHING ========== */
.vocab-progress {
  text-align: center;
  margin-bottom: 16px;
  font-size: 14px;
  color: var(--text-secondary);
}

.progress-bar-wrapper {
  width: 100%;
  height: 4px;
  background: var(--border-color);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--crimson), var(--gold));
  border-radius: 2px;
  transition: width 0.4s ease;
}

.vocab-word-card {
  text-align: center;
  padding: 28px 20px;
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  border-radius: 10px;
  margin-bottom: 20px;
  position: relative;
}

.vocab-word-card::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 3px;
  background: var(--crimson);
  border-radius: 2px;
}

.current-word {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(36px, 8vw, 52px);
  color: var(--crimson);
  letter-spacing: 4px;
}

.word-context {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  font-style: italic;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.option-btn {
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  line-height: 1.5;
  min-height: 48px;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--gold);
  background: var(--hover-bg);
}

.option-btn.correct {
  background: var(--correct-bg);
  border-color: var(--correct-border);
  color: var(--correct-border);
}

.option-btn.wrong {
  background: var(--wrong-bg);
  border-color: var(--wrong-border);
  color: var(--wrong-border);
}

.option-btn.disabled {
  cursor: default;
  opacity: 0.6;
}

.option-btn.disabled.correct {
  opacity: 1;
}

/* ========== MODE 2: FILL IN BLANK ========== */
.fill-question-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 24px 20px;
  margin-bottom: 16px;
}

.fill-q-number {
  display: inline-block;
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  background: var(--crimson);
  color: #fff;
  border-radius: 50%;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 12px;
}

.fill-sentence {
  font-size: 17px;
  line-height: 2;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.blank-slot {
  display: inline-block;
  min-width: 60px;
  padding: 2px 10px;
  border-bottom: 2px dashed var(--gold);
  margin: 0 2px;
  text-align: center;
  font-weight: 700;
  color: var(--jade);
  transition: all 0.3s;
  cursor: pointer;
  vertical-align: baseline;
}

.blank-slot.filled {
  border-bottom-style: solid;
  border-bottom-color: var(--jade);
  background: rgba(45, 106, 79, 0.08);
  border-radius: 4px 4px 0 0;
}

.blank-slot.correct-blank {
  border-bottom-color: var(--correct-border);
  color: var(--correct-border);
  background: var(--correct-bg);
}

.blank-slot.wrong-blank {
  border-bottom-color: var(--wrong-border);
  color: var(--wrong-border);
  background: var(--wrong-bg);
  text-decoration: line-through;
}

.word-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--border-color);
}

.word-chip {
  padding: 6px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-primary);
  user-select: none;
  -webkit-user-select: none;
}

.word-chip:hover:not(.used) {
  border-color: var(--jade);
  color: var(--jade);
}

.word-chip.used {
  opacity: 0.3;
  cursor: default;
  text-decoration: line-through;
}

.word-chip.selected {
  background: var(--jade);
  color: #fff;
  border-color: var(--jade);
}

.fill-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.btn-primary, .btn-secondary {
  padding: 10px 24px;
  border-radius: 6px;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  min-height: 44px;
}

.btn-primary {
  background: var(--crimson);
  color: #fff;
}

.btn-primary:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
}

.btn-secondary:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.fill-result-banner {
  padding: 16px;
  border-radius: 8px;
  text-align: center;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: none;
}

.fill-result-banner.show {
  display: block;
  animation: fadeIn 0.3s ease;
}

/* ========== MODE 3: MEMORY GAME ========== */
.memory-stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--text-secondary);
}

.stat-value {
  font-weight: 700;
  color: var(--gold);
  font-size: 16px;
}

.memory-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

@media (max-width: 480px) {
  .memory-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
}

.memory-card {
  aspect-ratio: 3/4;
  perspective: 600px;
  cursor: pointer;
  min-height: 90px;
}

.memory-card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.5s ease;
  transform-style: preserve-3d;
}

.memory-card.flipped .memory-card-inner {
  transform: rotateY(180deg);
}

.memory-card.matched .memory-card-inner {
  transform: rotateY(180deg);
}

.memory-front, .memory-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px;
  text-align: center;
}

.memory-front {
  background: linear-gradient(135deg, var(--crimson), #6B1010);
  border: 2px solid rgba(201,168,76,0.4);
  color: var(--gold-light);
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(24px, 5vw, 36px);
}

html.dark .memory-front {
  background: linear-gradient(135deg, #2A1A3A, #1A1A3E);
  border-color: rgba(232, 200, 106, 0.3);
}

.memory-back {
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  transform: rotateY(180deg);
  font-size: clamp(12px, 2.8vw, 15px);
  line-height: 1.4;
  color: var(--text-primary);
  font-weight: 700;
}

.memory-back.is-word {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(22px, 5vw, 32px);
  color: var(--crimson);
}

.memory-card.matched .memory-back {
  border-color: var(--correct-border);
  background: var(--correct-bg);
}

.memory-card.wrong-match .memory-card-inner {
  animation: shakeCard 0.4s ease;
}

@keyframes shakeCard {
  0%, 100% { transform: rotateY(180deg) translateX(0); }
  25% { transform: rotateY(180deg) translateX(-5px); }
  75% { transform: rotateY(180deg) translateX(5px); }
}

/* ========== RESULT SCREEN ========== */
.result-screen {
  text-align: center;
  padding: 40px 20px;
  animation: fadeIn 0.5s ease;
}

.result-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.result-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 32px;
  color: var(--gold);
  margin-bottom: 12px;
  letter-spacing: 4px;
}

.result-score {
  font-size: 48px;
  font-weight: 900;
  color: var(--crimson);
  margin-bottom: 8px;
}

.result-detail {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  line-height: 1.8;
}

.result-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

/* ========== ANSWER TABLE ========== */
.answer-section {
  margin-top: 24px;
}

.answer-toggle {
  width: 100%;
  padding: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  cursor: pointer;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.answer-toggle i {
  transition: transform 0.3s;
}

.answer-toggle.open i {
  transform: rotate(180deg);
}

.answer-content {
  display: none;
  margin-top: 12px;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  animation: fadeIn 0.3s ease;
}

.answer-content.show {
  display: block;
}

.answer-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.answer-table th {
  background: var(--crimson);
  color: #fff;
  padding: 10px 12px;
  text-align: left;
  font-weight: 700;
  letter-spacing: 1px;
}

.answer-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-color);
  vertical-align: top;
}

.answer-table tr:hover td {
  background: var(--hover-bg);
}

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--modal-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

.modal-box {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 28px 24px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.modal-box h3 {
  font-size: 20px;
  margin-bottom: 12px;
  color: var(--crimson);
}

.modal-box p {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.6;
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* ========== COMPLETION CELEBRATION ========== */
@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

.pop-in {
  animation: popIn 0.4s ease;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

/* ========== NEXT BUTTON ========== */
.next-btn-wrapper {
  text-align: center;
  margin-top: 16px;
  display: none;
}

.next-btn-wrapper.show {
  display: block;
  animation: fadeIn 0.3s ease;
}

/* Fill blank question navigation */
.fill-nav {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.fill-nav-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border-color);
  background: var(--bg-card);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Serif TC', serif;
  color: var(--text-primary);
}

.fill-nav-btn.active {
  background: var(--crimson);
  color: #fff;
  border-color: var(--crimson);
}

.fill-nav-btn.done {
  background: var(--jade);
  color: #fff;
  border-color: var(--jade);
}

.selected-word-indicator {
  padding: 8px 12px;
  background: var(--hover-bg);
  border-radius: 6px;
  margin-bottom: 10px;
  font-size: 13px;
  color: var(--text-secondary);
  display: none;
}

.selected-word-indicator.show {
  display: block;
}

.selected-word-indicator strong {
  color: var(--jade);
}
</style>
</head>
<body>

<div class="container" id="app">
  <!-- MAIN MENU -->
  <div id="menuView">
    <div class="header">
      <div class="title-wrapper">
        <div class="title-deco">蘇洵</div>
        <h1 class="main-title">《六國論》</h1>
        <div class="subtitle">課堂互動遊戲</div>
        <div class="author-tag">高中中國語文</div>
      </div>
    </div>
    <div class="mode-select">
      <div class="mode-card" onclick="startGame(1)">
        <div class="mode-icon"><i class="fas fa-puzzle-piece"></i></div>
        <div class="mode-title">壹 · 詞語配對</div>
        <div class="mode-desc">從 15 個關鍵詞中逐一選出正確解釋，附 5 個干擾選項，考驗你的古文詞彙功力</div>
      </div>
      <div class="mode-card" onclick="startGame(2)">
        <div class="mode-icon"><i class="fas fa-pen-nib"></i></div>
        <div class="mode-title">貳 · 背誦填空</div>
        <div class="mode-desc">節錄 10 句重要段落，每句刪去 2–3 個關鍵詞，從詞語庫中選詞填入，適合分組競賽</div>
      </div>
      <div class="mode-card" onclick="startGame(3)">

<script>
// ========== DARK MODE DETECTION ==========
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {

// ========== GAME DATA ==========

// Mode 1: 15 keywords + 5 distractors
var vocabData = [

  { word: '劫', context: '「為秦人積威之所劫」', answer: '威脅、懾服', options: [] },

var allCorrectAnswers = vocabData.map(function(v) { return v.answer; });
var distractors = [
  '迅速、快速',
  '修築城牆以作防禦',
  '完全覆蓋、遮蔽',

// Mode 2: Fill in the blank
var fillData = [
  {
    full: '六國破滅，非兵不利，戰不善，弊在賂秦。',

    blanks: ['弊', '賂'],

    extraWords: ['盡', '荊棘']

  {

  {

  },
  {

  },

];

// Mode 3: Memory pairs
var memoryPairs = [
  { word: '賂', meaning: '贈送財物討好對方' },
  { word: '率', meaning: '皆、都' },
  { word: '厭', meaning: '通「饜」，滿足' },
  { word: '彌', meaning: '更甚、越加' },
  { word: '劫', meaning: '威脅、懾服' },
  { word: '速', meaning: '招致' },
  { word: '洎', meaning: '及至' },
  { word: '判', meaning: '清晰分明' },
  { word: '完', meaning: '保全、完好無缺' },
  { word: '與', meaning: '親附、結交' }
];

// ========== UTILITY ==========
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function showMenu() {
  document.getElementById('menuView').style.display = 'block';
  document.querySelectorAll('.game-view').forEach(function(v) { v.classList.remove('active'); });
  window.scrollTo(0, 0);
}

function showView(id) {
  document.getElementById('menuView').style.display = 'none';
  document.querySelectorAll('.game-view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function toggleAnswer(prefix) {
  var toggle = document.getElementById(prefix + 'AnswerToggle');
  var content = document.getElementById(prefix + 'AnswerContent');
  toggle.classList.toggle('open');
  content.classList.toggle('show');
}

function startGame(mode) {
  if (mode === 1) initVocabGame();
  else if (mode === 2) initFillGame();
  else if (mode === 3) initMemoryGame();
}

// ========== GAME 1: VOCABULARY MATCHING ==========
var g1CurrentIndex = 0;
var g1Score = 0;
var g1ShuffledVocab = [];
var g1Answered = false;

function initVocabGame() {
  g1CurrentIndex = 0;
  g1Score = 0;
  g1Answered = false;
  document.getElementById('g1Score').textContent = '0';
  document.getElementById('g1Result').innerHTML = '';
  document.getElementById('g1AnswerSection').style.display = 'none';
  document.getElementById('g1Next').classList.remove('show');

  g1ShuffledVocab = shuffle(vocabData);

  // For each word, generate 4 options (1 correct + 3 wrong)
  g1ShuffledVocab.forEach(function(item) {
    var wrongPool = allCorrectAnswers.filter(function(a) { return a !== item.answer; }).concat(distractors);
    var wrongOptions = shuffle(wrongPool).slice(0, 3);
    item.options = shuffle([item.answer].concat(wrongOptions));
  });

  showView('game1View');
  renderVocabQuestion();
}

function renderVocabQuestion() {
  var item = g1ShuffledVocab[g1CurrentIndex];
  var qNum = g1CurrentIndex + 1;
  document.getElementById('g1Progress').textContent = '第 ' + qNum + ' 題 / 共 15 題';
  document.getElementById('g1Bar').style.width = ((qNum - 1) / 15 * 100) + '%';
  document.getElementById('g1Next').classList.remove('show');
  g1Answered = false;

  var html = '<div class="vocab-word-card">';
  html += '<div class="current-word">' + item.word + '</div>';
  html += '<div class="word-context">原文：' + item.context + '</div>';
  html += '</div>';
  html += '<div class="options-grid">';
  item.options.forEach(function(opt, i) {
    html += '<button class="option-btn" data-index="' + i + '" onclick="selectVocabOption(this, ' + i + ')">';
    html += '<span style="color:var(--gold);font-weight:700;margin-right:8px;">' + String.fromCharCode(65 + i) + '</span> ' + opt;
    html += '</button>';
  });
  html += '</div>';

  document.getElementById('g1Content').innerHTML = html;
}

function selectVocabOption(btn, index) {
  if (g1Answered) return;
  g1Answered = true;

  var item = g1ShuffledVocab[g1CurrentIndex];
  var selected = item.options[index];
  var isCorrect = selected === item.answer;

  if (isCorrect) {
    g1Score++;
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
  }

  document.getElementById('g1Score').textContent = g1Score;

  // Disable all and highlight correct
  var allBtns = document.querySelectorAll('#g1Content .option-btn');
  allBtns.forEach(function(b) {
    b.classList.add('disabled');
    if (item.options[parseInt(b.getAttribute('data-index'))] === item.answer) {
      b.classList.add('correct');
    }
  });

  if (g1CurrentIndex < 14) {
    document.getElementById('g1Next').classList.add('show');
  } else {
    // Game complete
    setTimeout(showVocabResult, 800);
  }
}

function nextVocab() {
  g1CurrentIndex++;
  renderVocabQuestion();
}

function showVocabResult() {
  var pct = Math.round(g1Score / 15 * 100);
  var grade = pct >= 90 ? '卓越非凡！' : pct >= 70 ? '表現出色！' : pct >= 50 ? '尚可，繼續加油！' : '需要多加溫習！';
  var icon = pct >= 70 ? '🏆' : pct >= 50 ? '📚' : '💪';

  document.getElementById('g1Bar').style.width = '100%';
  document.getElementById('g1Content').innerHTML = '';
  document.getElementById('g1Next').classList.remove('show');

  var html = '<div class="result-screen pop-in">';
  html += '<div class="result-icon">' + icon + '</div>';
  html += '<div class="result-title">' + grade + '</div>';
  html += '<div class="result-score">' + g1Score + ' / 15</div>';
  html += '<div class="result-detail">正確率：' + pct + '%</div>';
  html += '<div class="result-actions">';
  html += '<button class="btn-primary" onclick="initVocabGame()"><i class="fas fa-redo"></i> 再玩一次</button>';
  html += '<button class="btn-secondary" onclick="showMenu()"><i class="fas fa-home"></i> 返回選單</button>';
  html += '</div></div>';

  document.getElementById('g1Result').innerHTML = html;

  // Build answer table
  var tableHtml = '<table class="answer-table"><thead><tr><th>#</th><th>詞語</th><th>正確解釋</th></tr></thead><tbody>';
  vocabData.forEach(function(item, i) {
    tableHtml += '<tr><td>' + (i + 1) + '</td><td style="font-weight:700;color:var(--crimson)">' + item.word + '</td><td>' + item.answer + '</td></tr>';
  });
  tableHtml += '</tbody></table>';
  document.getElementById('g1AnswerContent').innerHTML = tableHtml;
  document.getElementById('g1AnswerSection').style.display = 'block';
}

// ========== GAME 2: FILL IN BLANK ==========
var g2CurrentQ = 0;
var g2Answers = []; // g2Answers[q][blankIndex] = word
var g2SelectedWord = null;
var g2Checked = false;
var g2TotalBlanks = 0;

function initFillGame() {
  g2CurrentQ = 0;
  g2SelectedWord = null;
  g2Checked = false;
  g2Answers = [];
  g2TotalBlanks = 0;

  fillData.forEach(function(q, qi) {
    g2Answers[qi] = [];
    for (var b = 0; b < q.blanks.length; b++) {
      g2Answers[qi][b] = null;
      g2TotalBlanks++;
    }
  });

  document.getElementById('g2Total').textContent = g2TotalBlanks;
  document.getElementById('g2Score').textContent = '0';
  document.getElementById('g2ResultBanner').classList.remove('show');
  document.getElementById('g2AnswerSection').style.display = 'none';
  document.getElementById('g2CheckBtn').style.display = '';

  // Build nav
  var navHtml = '';
  fillData.forEach(function(q, i) {
    navHtml += '<button class="fill-nav-btn' + (i === 0 ? ' active' : '') + '" onclick="goToFillQ(' + i + ')">' + (i + 1) + '</button>';
  });
  document.getElementById('g2Nav').innerHTML = navHtml;

  showView('game2View');
  renderFillQuestion();
}

function goToFillQ(index) {
  g2CurrentQ = index;
  renderFillQuestion();
  updateFillNav();
}

function updateFillNav() {
  var btns = document.querySelectorAll('.fill-nav-btn');
  btns.forEach(function(btn, i) {
    btn.classList.remove('active');
    if (i === g2CurrentQ) btn.classList.add('active');
    // Check if all blanks filled
    var allFilled = g2Answers[i] && g2Answers[i].every(function(a) { return a !== null; });
    if (allFilled) {
      btn.classList.add('done');
    } else {
      btn.classList.remove('done');
    }
  });
}

function renderFillQuestion() {
  var q = fillData[g2CurrentQ];
  g2SelectedWord = null;

  var html = '<div class="fill-question-card">';
  html += '<div class="fill-q-number">' + (g2CurrentQ + 1) + '</div>';

  // Parse the display text and insert blank slots
  var parts = q.display.split('____');
  var sentenceHtml = '<div class="fill-sentence">';
  parts.forEach(function(part, i) {
    sentenceHtml += part;
    if (i < q.blanks.length) {
      var filled = g2Answers[g2CurrentQ][i];
      var filledClass = filled ? ' filled' : '';
      if (g2Checked) {
        if (filled === q.blanks[i]) {
          filledClass += ' correct-blank';
        } else {
          filledClass += ' wrong-blank';
        }
      }
      sentenceHtml += '<span class="blank-slot' + filledClass + '" data-blank="' + i + '" onclick="clickBlank(' + i + ')">';
      sentenceHtml += filled || '　　';
      sentenceHtml += '</span>';
    }
  });
  sentenceHtml += '</div>';
  html += sentenceHtml;

  // Word bank
  var allWords = shuffle(q.blanks.concat(q.extraWords));
  html += '<div class="selected-word-indicator" id="selectedIndicator">已選擇：<strong id="selectedWordText"></strong>（點擊空格填入）</div>';
  html += '<div class="word-bank">';
  allWords.forEach(function(w) {
    var isUsed = g2Answers[g2CurrentQ].indexOf(w) !== -1;
    var usedClass = isUsed ? ' used' : '';
    html += '<span class="word-chip' + usedClass + '" onclick="selectFillWord(this, \'' + w.replace(/'/g, "\\'") + '\')">' + w + '</span>';
  });
  html += '</div>';

  html += '</div>';

  // Navigation within fill questions
  html += '<div style="display:flex;justify-content:space-between;margin-top:12px;">';
  if (g2CurrentQ > 0) {
    html += '<button class="btn-secondary" onclick="goToFillQ(' + (g2CurrentQ - 1) + ')"><i class="fas fa-arrow-left"></i> 上一題</button>';
  } else {
    html += '<div></div>';
  }
  if (g2CurrentQ < fillData.length - 1) {
    html += '<button class="btn-secondary" onclick="goToFillQ(' + (g2CurrentQ + 1) + ')">下一題 <i class="fas fa-arrow-right"></i></button>';
  } else {
    html += '<div></div>';
  }
  html += '</div>';

  document.getElementById('g2Content').innerHTML = html;
  updateFillNav();
}

function selectFillWord(chip, word) {
  if (chip.classList.contains('used') || g2Checked) return;

  // Deselect previous
  document.querySelectorAll('.word-chip.selected').forEach(function(c) { c.classList.remove('selected'); });

  g2SelectedWord = word;
  chip.classList.add('selected');

  // Show indicator
  var indicator = document.getElementById('selectedIndicator');
  if (indicator) {
    indicator.classList.add('show');
    document.getElementById('selectedWordText').textContent = word;
  }
}

function clickBlank(blankIndex) {
  if (g2Checked) return;

  var q = fillData[g2CurrentQ];

  // If blank already filled, remove it first
  if (g2Answers[g2CurrentQ][blankIndex] !== null) {
    var removedWord = g2Answers[g2CurrentQ][blankIndex];
    g2Answers[g2CurrentQ][blankIndex] = null;
    // Un-use the chip
    renderFillQuestion();
    return;
  }

  if (!g2SelectedWord) return;

  g2Answers[g2CurrentQ][blankIndex] = g2SelectedWord;
  g2SelectedWord = null;
  renderFillQuestion();
}

function checkFillAnswers() {
  g2Checked = true;
  var score = 0;

  fillData.forEach(function(q, qi) {
    q.blanks.forEach(function(correctWord, bi) {
      if (g2Answers[qi][bi] === correctWord) {
        score++;
      }
    });
  });

  document.getElementById('g2Score').textContent = score;

  var banner = document.getElementById('g2ResultBanner');
  var pct = Math.round(score / g2TotalBlanks * 100);
  banner.style.background = pct >= 70 ? 'var(--correct-bg)' : 'var(--wrong-bg)';
  banner.style.color = pct >= 70 ? 'var(--correct-border)' : 'var(--wrong-border)';
  banner.style.border = '1px solid ' + (pct >= 70 ? 'var(--correct-border)' : 'var(--wrong-border)');
  banner.textContent = '答對 ' + score + ' / ' + g2TotalBlanks + '（正確率：' + pct + '%）';
  banner.classList.add('show');

  document.getElementById('g2CheckBtn').style.display = 'none';

  // Show answer section
  var ansHtml = '<div style="line-height:2.2;font-size:15px;">';
  fillData.forEach(function(q, i) {
    ansHtml += '<div style="margin-bottom:12px;"><strong style="color:var(--crimson)">' + (i + 1) + '.</strong> ' + q.full + '</div>';
  });
  ansHtml += '</div>';
  document.getElementById('g2AnswerContent').innerHTML = ansHtml;
  document.getElementById('g2AnswerSection').style.display = 'block';

  renderFillQuestion();
}

function resetFill() {
  g2Checked = false;
  g2Answers = [];
  fillData.forEach(function(q, qi) {
    g2Answers[qi] = [];
    for (var b = 0; b < q.blanks.length; b++) {
      g2Answers[qi][b] = null;
    }
  });
  document.getElementById('g2Score').textContent = '0';
  document.getElementById('g2ResultBanner').classList.remove('show');
  document.getElementById('g2AnswerSection').style.display = 'none';
  document.getElementById('g2CheckBtn').style.display = '';
  renderFillQuestion();
}

// ========== GAME 3: MEMORY GAME ==========
var g3Cards = [];
var g3Flipped = [];
var g3MatchedPairs = 0;
var g3FlipCount = 0;
var g3IsProcessing = false;

function initMemoryGame() {
  g3MatchedPairs = 0;
  g3FlipCount = 0;
  g3Flipped = [];
  g3IsProcessing = false;

  document.getElementById('g3Matched').textContent = '0';
  document.getElementById('g3Flips').textContent = '0';
  document.getElementById('g3Pairs').textContent = '0';
  document.getElementById('g3Result').innerHTML = '';
  document.getElementById('g3AnswerSection').style.display = 'none';

  // Create card array
  g3Cards = [];
  memoryPairs.forEach(function(pair, i) {
    g3Cards.push({ id: i, type: 'word', text: pair.word, pairId: i });
    g3Cards.push({ id: i, type: 'meaning', text: pair.meaning, pairId: i });
  });
  g3Cards = shuffle(g3Cards);

  showView('game3View');
  renderMemoryGrid();
}

function renderMemoryGrid() {
  var html = '';
  g3Cards.forEach(function(card, i) {
    html += '<div class="memory-card" data-card-index="' + i + '" onclick="flipCard(' + i + ')">';
    html += '<div class="memory-card-inner">';
    html += '<div class="memory-front">論</div>';
    html += '<div class="memory-back' + (card.type === 'word' ? ' is-word' : '') + '">' + card.text + '</div>';
    html += '</div></div>';
  });
  document.getElementById('g3Grid').innerHTML = html;
}

function flipCard(index) {
  if (g3IsProcessing) return;

  var cardEl = document.querySelectorAll('.memory-card')[index];
  if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
  if (g3Flipped.length >= 2) return;

  cardEl.classList.add('flipped');
  g3Flipped.push(index);
  g3FlipCount++;
  document.getElementById('g3Flips').textContent = g3FlipCount;

  if (g3Flipped.length === 2) {
    g3IsProcessing = true;
    var first = g3Cards[g3Flipped[0]];
    var second = g3Cards[g3Flipped[1]];

    if (first.pairId === second.pairId && first.type !== second.type) {
      // Match!
      setTimeout(function() {
        var card1 = document.querySelectorAll('.memory-card')[g3Flipped[0]];
        var card2 = document.querySelectorAll('.memory-card')[g3Flipped[1]];
        card1.classList.add('matched');
        card2.classList.add('matched');
        g3MatchedPairs++;
        document.getElementById('g3Matched').textContent = g3MatchedPairs;
        document.getElementById('g3Pairs').textContent = g3MatchedPairs;
        g3Flipped = [];
        g3IsProcessing = false;

        if (g3MatchedPairs === 10) {
          setTimeout(showMemoryResult, 600);
        }
      }, 500);
    } else {
      // No match
      var idx0 = g3Flipped[0];
      var idx1 = g3Flipped[1];
      setTimeout(function() {
        var card1 = document.querySelectorAll('.memory-card')[idx0];
        var card2 = document.querySelectorAll('.memory-card')[idx1];
        card1.classList.add('wrong-match');
        card2.classList.add('wrong-match');
        setTimeout(function() {
          card1.classList.remove('flipped', 'wrong-match');
          card2.classList.remove('flipped', 'wrong-match');
          g3Flipped = [];
          g3IsProcessing = false;
        }, 500);
      }, 700);
    }
  }
}

function showMemoryResult() {
  var rating = g3FlipCount <= 25 ? '記憶大師！' : g3FlipCount <= 35 ? '表現優秀！' : g3FlipCount <= 50 ? '尚可，繼續努力！' : '多加練習！';
  var icon = g3FlipCount <= 30 ? '🧠' : g3FlipCount <= 45 ? '📚' : '💪';

  var html = '<div class="result-screen pop-in" style="margin-top:20px;">';
  html += '<div class="result-icon">' + icon + '</div>';
  html += '<div class="result-title">' + rating + '</div>';
  html += '<div class="result-detail">共翻牌 <strong style="color:var(--gold);font-size:24px;">' + g3FlipCount + '</strong> 次完成全部配對</div>';
  html += '<div class="result-actions">';
  html += '<button class="btn-primary" onclick="initMemoryGame()"><i class="fas fa-redo"></i> 再玩一次</button>';
  html += '<button class="btn-secondary" onclick="showMenu()"><i class="fas fa-home"></i> 返回選單</button>';
  html += '</div></div>';

  document.getElementById('g3Result').innerHTML = html;

  // Build answer table
  var tableHtml = '<table class="answer-table"><thead><tr><th>#</th><th>詞語</th><th>解釋</th></tr></thead><tbody>';
  memoryPairs.forEach(function(pair, i) {
    tableHtml += '<tr><td>' + (i + 1) + '</td><td style="font-weight:700;color:var(--crimson)">' + pair.word + '</td><td>' + pair.meaning + '</td></tr>';
  });
  tableHtml += '</tbody></table>';
  document.getElementById('g3AnswerContent').innerHTML = tableHtml;
  document.getElementById('g3AnswerSection').style.display = 'block';
}
</script>
